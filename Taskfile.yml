# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  VERSION:
    sh: git describe --tags --abbrev=0 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  LDFLAGS: >-
    -s -w
    -X github.com/varavelio/litemigrate/internal/version.Version={{.VERSION}}
    -X github.com/varavelio/litemigrate/internal/version.Commit={{.COMMIT}}
    -X github.com/varavelio/litemigrate/internal/version.Date={{.DATE}}

tasks:
  ci:
    desc: Run CI tasks
    cmds:
      - task: format
      - task: test
      - task: lint
      - task: build

  deps:
    desc: Install dependencies
    cmd: go mod download

  build:
    desc: Build the project
    cmd: go build -o dist/litemigrate cmd/litemigrate/main.go

  format:
    desc: Format code
    cmds:
      - gofumpt -w -extra .
      - golines -w .
      - go fmt ./...
      - dprint fmt --config ./dprint.json --log-level warn

  test:
    desc: Run tests
    cmd: go test -v ./...

  lint:
    desc: Run linter
    cmd: golangci-lint run ./...

  # Cross-compilation targets for release builds

  build-all:
    desc: Build binaries for all supported platforms
    cmds:
      - task: build-linux-amd64
      - task: build-linux-arm64
      - task: build-darwin-amd64
      - task: build-darwin-arm64
      - task: build-windows-amd64
      - task: build-windows-arm64
      - task: build-checksums

  build-linux-amd64:
    desc: Build for Linux AMD64
    cmd: >-
      CGO_ENABLED=0 GOOS=linux GOARCH=amd64
      go build -ldflags "{{.LDFLAGS}}" -o dist/litemigrate-linux-amd64 cmd/litemigrate/main.go

  build-linux-arm64:
    desc: Build for Linux ARM64
    cmd: >-
      CGO_ENABLED=0 GOOS=linux GOARCH=arm64
      go build -ldflags "{{.LDFLAGS}}" -o dist/litemigrate-linux-arm64 cmd/litemigrate/main.go

  build-darwin-amd64:
    desc: Build for macOS AMD64
    cmd: >-
      CGO_ENABLED=0 GOOS=darwin GOARCH=amd64
      go build -ldflags "{{.LDFLAGS}}" -o dist/litemigrate-darwin-amd64 cmd/litemigrate/main.go

  build-darwin-arm64:
    desc: Build for macOS ARM64 (Apple Silicon)
    cmd: >-
      CGO_ENABLED=0 GOOS=darwin GOARCH=arm64
      go build -ldflags "{{.LDFLAGS}}" -o dist/litemigrate-darwin-arm64 cmd/litemigrate/main.go

  build-windows-amd64:
    desc: Build for Windows AMD64
    cmd: >-
      CGO_ENABLED=0 GOOS=windows GOARCH=amd64
      go build -ldflags "{{.LDFLAGS}}" -o dist/litemigrate-windows-amd64.exe cmd/litemigrate/main.go

  build-windows-arm64:
    desc: Build for Windows ARM64
    cmd: >-
      CGO_ENABLED=0 GOOS=windows GOARCH=arm64
      go build -ldflags "{{.LDFLAGS}}" -o dist/litemigrate-windows-arm64.exe cmd/litemigrate/main.go

  build-checksums:
    desc: Generate checksums for all binaries in dist/
    cmd: cd dist && sha256sum litemigrate-* > checksums.txt
